<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Contatos de Reuel</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <video autoplay muted loop playsinline id="video-fundo">
        <source src="./images/videoplayback.mp4" type="video/mp4">
    </video>
    
    <div class="overlay"></div>
    
    <div class="imagem-reuel">
        <img src="./images/foto-reuel.jpg" alt="Foto de Reuel" class="foto-perfil"> 
    </div>
    
    <div class="cabecalho-da-lista-de-links">
        <h1>Reuel</h1>
    </div>

    <a href="https://www.instagram.com/reuelcastroo/" class="link-card secao-instagram">
        <img src="./images/imagem-instagram.png" alt="Instagram" class="icone">
        <span>Instagram</span>
    </a>

    <a href="https://wa.link/56r442" class="link-card secao-whatsapp">
        <img src="./images/whatsapp-imagem.webp" alt="WhatsApp" class="icone">
        <span>WhatsApp</span>
    </a>

    <a href="https://discord.gg/SEU_LINK" class="link-card secao-discord">
        <img src="./images/icons8-discord-94.png" alt="Discord" class="icone">
        <span>Discord</span>
    </a>
</body>
</html>
