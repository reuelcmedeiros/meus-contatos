<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página de Contatos de Reuel</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <video autoplay muted loop playsinline id="video-fundo">
      <source src="./images/videoplayback.mp4" type="video/mp4" />
    </video>

    <div class="overlay"></div>

    <div class="imagem-reuel">
      <img
        id="foto"
        src="./images/foto-reuel.jpg"
        alt="Foto de Reuel"
        class="foto-perfil"
      />
    </div>

    <div class="cabecalho-da-lista-de-links">
      <h1 id="nome">Reuel Castro Medeiros</h1>
    </div>
    <p class="bio">Meios de contato:</p>

    <a
      href="https://www.linkedin.com/in/reuel-castro-2720b92b0/"
      class="link-card secao-linkedin"
    >
      <img src="./images/linkedin-icon.png" alt="LinkedIn" class="icone" />
      <span>LinkedIn</span>
    </a>
    <a
      href="https://www.instagram.com/reuelcastroo/"
      class="link-card secao-instagram"
    >
      <img src="./images/imagem-instagram.png" alt="Instagram" class="icone" />
      <span>Instagram</span>
    </a>

    <a href="https://wa.link/56r442" class="link-card secao-whatsapp">
      <img src="./images/whatsapp-imagem.webp" alt="WhatsApp" class="icone" />
      <span>WhatsApp</span>
    </a>

    <a href="https://discord.gg/SEU_LINK" class="link-card secao-discord">
      <img src="./images/icons8-discord-94.png" alt="Discord" class="icone" />
      <span>Discord</span>
    </a>
    <div class="tecnologias">
      <h2>Minhas tecnologias:</h2>

      <div class="tech-grid">
        <div class="tech-item">
          <img src="./images/html-icon.png" alt="HTML" />
          <span>HTML</span>
        </div>

        <div class="tech-item">
          <img src="./images/css-icon.svg" alt="CSS" />
          <span>CSS</span>
        </div>

        <div class="tech-item">
          <img src="./images/java-script-image.png" alt="JavaScript" />
          <span>JS</span>
        </div>

        <div class="tech-item">
          <img src="./images/Csharp_Logo.png" alt="C#" />
          <span>C#</span>
        </div>

        <div class="tech-item">
          <img src="./images/Mysql_logo.png" alt="MySQL" />
          <span>MySQL</span>
          
        </div>
      </div>
    </div>

    <script src="sc.js"></script>
  </body>
</html>
