<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Contatos de Reuel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 🔥 VÍDEO DE FUNDO (NO INÍCIO) -->
    <video autoplay muted loop playsinline id="video-fundo">
        <source src="./estilo/imagens/videoplayback.mp4" type="video/mp4">
    </video>
    
    <!-- 🖤 OVERLAY ESCURO (ESSENCIAL) -->
    <div class="overlay"></div>
    
    <!-- Foto de perfil -->
    <div class="imagem-reuel">
        <img src="./estilo/imagens/foto-reuel.jpg.jpg" alt="Foto de Reuel"> 
    </div>
    
    <!-- Título -->
    <div class="cabecalho-da-lista-de-links">
        <h1>Reuel</h1>
    </div>

    <!-- Instagram -->
    <a href="https://www.instagram.com/reuelcastroo/" class="secao-instagram">
        <img src="./estilo/imagens/imagem-instagram.jpg.png" alt="Instagram" class="icone">
        <span>Instagram</span>
    </a>

    <!-- WhatsApp -->
    <a href="https://wa.link/56r442" class="secao-whatsapp">
        <img src="./estilo/imagens/whatsapp-imagem.jpg.webp" alt="WhatsApp" class="icone">
        <span>Whatsapp</span>
    </a>

    <!-- Discord (corrigido - troque o link e ícone) -->
    <a href="https://discord.gg/SEU_LINK_AQUI" class="secao-discord">
        <img src="./estilo/imagens/discord-icone.png" alt="Discord" class="icone">
        <span>Discord</span>
    </a>
</body>
</html>
